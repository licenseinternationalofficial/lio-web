<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicitud Recibida - LIO</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
      padding: 1rem;
    }
    .card {
      background: white;
      padding: 3rem;
      border-radius: 20px;
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
      max-width: 480px;
      width: 100%;
      text-align: center;
      animation: fadeIn 0.6s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .icon { width: 80px; height: 80px; background: #dbeafe; color: #2563eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; font-size: 2.5rem; }
    h1 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 1rem; color: #1e293b; }
    p { color: #64748b; margin-bottom: 2rem; line-height: 1.6; }
    .btn {
      display: inline-block;
      width: 100%;
      padding: 0.9rem 1.8rem;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      transition: all 0.3s;
    }
    .btn:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 4px 14px rgba(59,130,246,0.3); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>¡Solicitud Enviada!</h1>
    <p>Hemos recibido tus datos correctamente. Nuestro equipo revisará la información y se pondrá en contacto contigo vía email o WhatsApp en las próximas 24 horas.</p>
    <a href="/" class="btn">Volver al Inicio</a>
  </div>
</body>
</html>
