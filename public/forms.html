<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Soporte de Formularios - LIO</title></head>
<body>
  <form name="tramite-licencia" action="/success.html" data-netlify="true" data-netlify-honeypot="bot-field" enctype="multipart/form-data" hidden>
    <input type="hidden" name="form-name" value="tramite-licencia" />
    <input type="text" name="bot-field" />
    <input type="text" name="nombreCompleto" />
    <input type="text" name="paisNacimiento" />
    <input type="date" name="fechaNacimiento" />
    <input type="text" name="paisResidencia" />
    <select name="vigencia"><option value="1 year"></option><option value="2 years"></option><option value="5 years"></option></select>
    <input type="text" name="estatura" />
    <select name="tipoSangre"><option value="O+"></option><option value="O-"></option><option value="A+"></option><option value="A-"></option><option value="B+"></option><option value="B-"></option><option value="AB+"></option><option value="AB-"></option></select>
    <input type="text" name="colorOjos" />
    <input type="file" name="fotoCarnet" />
    <input type="file" name="fotoFirma" />
    <input type="file" name="fotoID" />
    <input type="file" name="fotoLicencia" />
    <input type="email" name="email" />
    <input type="tel" name="telefono" />
  </form>
</body>
</html>
